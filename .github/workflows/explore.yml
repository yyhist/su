name: Su Explorer
on:
  push:
    branches: [main]
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  explore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Explore Environment
        run: |
          echo "=== GitHub Actions 环境 ==="
          echo "Runner: $(hostname)"
          echo "Date: $(date)"
          echo "IP: $(curl -s https://httpbin.org/ip 2>/dev/null || echo 'unknown')"
          echo "OS: $(uname -a)"
          echo "=== Done ==="
      
      - name: Update Status
        run: |
          echo "{\"last_run\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"runner\": \"$(hostname)\"}" > github_actions_status.json
      
      - name: Commit Status
        run: |
          git config user.name "su-bot"
          git config user.email "su@localhost"
          git add github_actions_status.json
          git diff --cached --quiet || git commit -m "actions: $(date)"
          git push
