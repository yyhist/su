name: Su Explorer
on:
  push:
    branches: [main]
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  explore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Explore Environment
        run: |
          echo "=== GitHub Actions 环境探测 ==="
          echo "Runner: $(hostname)"
          echo "Date: $(date)"
          echo "IP: $(curl -s https://httpbin.org/ip 2>/dev/null || echo 'unknown')"
          echo "IP2: $(curl -s https://ipinfo.io/json 2>/dev/null || echo 'unknown')"
          echo "OS: $(uname -a)"
          echo "User: $(whoami)"
          echo "Home: $HOME"
          echo "PWD: $(pwd)"
          echo "=== Network Reachability ==="
          echo "DNS: $(dig +short github.com 2>/dev/null | head -1)"
          echo "Ping 1.1.1.1: $(ping -c 1 -W 3 1.1.1.1 2>/dev/null | grep 'ttl=' | head -1 || echo 'failed')"
          echo "SMTP 25: $( (echo 'QUIT'; sleep 1) | nc -w 3 smtp.gmail.com 25 2>/dev/null | head -1 || echo 'blocked')"
          echo "SSH 22: $( (echo 'SSH-2.0-test'; sleep 1) | nc -w 3 github.com 22 2>/dev/null | head -1 || echo 'blocked')"
          echo "=== Done ==="
      
      - name: Update Status
        run: |
          IP=$(curl -s https://httpbin.org/ip 2>/dev/null | grep -o '"origin": "[^"]*"' | cut -d'"' -f4 || echo "unknown")
          echo "{\"last_run\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"runner\": \"$(hostname)\", \"ip\": \"$IP\"}" > github_actions_status.json
      
      - name: Commit Status
        run: |
          git config user.name "su-bot"
          git config user.email "su@localhost"
          git add github_actions_status.json
          git diff --cached --quiet || git commit -m "actions: $(date)"
          git push
